<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>투명 이미지 크롭 도구</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #647086;
      --line: #d8deea;
      --accent: #0b7a75;
      --accent-dark: #075d59;
      --danger: #b42318;
      --tile: #eef2f7;
      --shadow: 0 16px 40px rgba(20, 33, 61, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.15;
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button,
    .file-label {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .button:hover,
    .file-label:hover {
      background: var(--accent-dark);
    }

    .button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    .button.secondary:hover {
      background: #f8fafc;
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #fileInput {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .dropzone {
      border: 2px dashed #a8b3c5;
      border-radius: 8px;
      min-height: 178px;
      background: var(--panel);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .dropzone.dragging {
      border-color: var(--accent);
      background: #eefaf8;
    }

    .dropzone strong {
      display: block;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .dropzone span {
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      min-height: 24px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 180px auto;
      min-width: 0;
    }

    .preview {
      min-height: 180px;
      background-color: var(--tile);
      background-image:
        linear-gradient(45deg, #d8dee8 25%, transparent 25%),
        linear-gradient(-45deg, #d8dee8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d8dee8 75%),
        linear-gradient(-45deg, transparent 75%, #d8dee8 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .preview img {
      max-width: 100%;
      max-height: 156px;
      object-fit: contain;
      image-rendering: auto;
    }

    .meta {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .name {
      font-weight: 650;
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }

    .detail {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .card-actions .button {
      min-height: 36px;
      flex: 1;
      padding: 0 10px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .app {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .file-label,
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>투명 이미지 크롭</h1>
        <p class="subhead">투명 여백을 제거하고 PNG 파일명에 _크롭을 붙여 저장합니다.</p>
      </div>
      <div class="toolbar">
        <label class="file-label" for="fileInput" title="PNG 이미지 선택">
          <span aria-hidden="true">＋</span>
          이미지 선택
        </label>
        <input id="fileInput" type="file" accept="image/png" multiple>
        <button class="button secondary" id="clearButton" type="button" disabled title="목록 비우기">비우기</button>
        <button class="button" id="downloadAllButton" type="button" disabled title="전체 다운로드">전체 다운로드</button>
      </div>
    </header>

    <section class="dropzone" id="dropzone">
      <div>
        <strong>PNG 파일을 여기에 끌어다 놓으세요</strong>
        <span>투명 픽셀(alpha 0)을 기준으로 상하좌우를 딱 맞게 자릅니다.</span>
      </div>
    </section>

    <p class="status" id="status">선택된 이미지가 없습니다.</p>
    <section class="grid" id="grid" aria-live="polite"></section>
  </main>

  <script>
    const fileInput = document.querySelector("#fileInput");
    const dropzone = document.querySelector("#dropzone");
    const grid = document.querySelector("#grid");
    const statusEl = document.querySelector("#status");
    const clearButton = document.querySelector("#clearButton");
    const downloadAllButton = document.querySelector("#downloadAllButton");

    const alphaThreshold = 0;
    const processedItems = [];

    fileInput.addEventListener("change", () => {
      handleFiles(fileInput.files);
      fileInput.value = "";
    });

    dropzone.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropzone.classList.add("dragging");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragging");
    });

    dropzone.addEventListener("drop", (event) => {
      event.preventDefault();
      dropzone.classList.remove("dragging");
      handleFiles(event.dataTransfer.files);
    });

    clearButton.addEventListener("click", () => {
      processedItems.forEach((item) => URL.revokeObjectURL(item.url));
      processedItems.length = 0;
      grid.innerHTML = "";
      updateControls();
      setStatus("선택된 이미지가 없습니다.");
    });

    downloadAllButton.addEventListener("click", () => {
      processedItems.forEach((item, index) => {
        setTimeout(() => downloadItem(item), index * 120);
      });
    });

    async function handleFiles(fileList) {
      const files = [...fileList].filter((file) => file.type === "image/png" || file.name.toLowerCase().endsWith(".png"));

      if (files.length === 0) {
        setStatus("PNG 파일만 선택할 수 있습니다.", true);
        return;
      }

      setStatus(`${files.length}개 이미지를 처리하는 중...`);

      for (const file of files) {
        try {
          const item = await cropTransparentImage(file);
          processedItems.push(item);
          renderItem(item);
        } catch (error) {
          renderError(file.name, error.message);
        }
      }

      updateControls();
      setStatus(`${processedItems.length}개 이미지 처리가 완료되었습니다.`);
    }

    async function cropTransparentImage(file) {
      const bitmap = await createImageBitmap(file);
      const originalWidth = bitmap.width;
      const originalHeight = bitmap.height;
      const sourceCanvas = document.createElement("canvas");
      sourceCanvas.width = originalWidth;
      sourceCanvas.height = originalHeight;

      const sourceContext = sourceCanvas.getContext("2d");
      sourceContext.drawImage(bitmap, 0, 0);

      const imageData = sourceContext.getImageData(0, 0, originalWidth, originalHeight);
      const bounds = findOpaqueBounds(imageData, originalWidth, originalHeight);

      if (!bounds) {
        throw new Error("보이는 픽셀이 없어 크롭할 수 없습니다.");
      }

      const outputWidth = bounds.right - bounds.left + 1;
      const outputHeight = bounds.bottom - bounds.top + 1;
      const outputCanvas = document.createElement("canvas");
      outputCanvas.width = outputWidth;
      outputCanvas.height = outputHeight;

      const outputContext = outputCanvas.getContext("2d");
      outputContext.drawImage(
        sourceCanvas,
        bounds.left,
        bounds.top,
        outputWidth,
        outputHeight,
        0,
        0,
        outputWidth,
        outputHeight
      );

      const blob = await canvasToBlob(outputCanvas);
      const url = URL.createObjectURL(blob);
      const outputName = buildOutputName(file.name);

      bitmap.close();

      return {
        originalName: file.name,
        outputName,
        url,
        blob,
        originalSize: `${originalWidth}x${originalHeight}`,
        croppedSize: `${outputWidth}x${outputHeight}`,
        removed: `${originalWidth - outputWidth}px / ${originalHeight - outputHeight}px`
      };
    }

    function findOpaqueBounds(imageData, width, height) {
      const data = imageData.data;
      let left = width;
      let top = height;
      let right = -1;
      let bottom = -1;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const alpha = data[(y * width + x) * 4 + 3];
          if (alpha > alphaThreshold) {
            if (x < left) left = x;
            if (x > right) right = x;
            if (y < top) top = y;
            if (y > bottom) bottom = y;
          }
        }
      }

      if (right === -1) {
        return null;
      }

      return { left, top, right, bottom };
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error("PNG 저장에 실패했습니다."));
          }
        }, "image/png");
      });
    }

    function buildOutputName(fileName) {
      const withoutExtension = fileName.replace(/\.png$/i, "");
      return `${withoutExtension}_크롭.png`;
    }

    function renderItem(item) {
      const card = document.createElement("article");
      card.className = "card";

      const preview = document.createElement("div");
      preview.className = "preview";

      const img = document.createElement("img");
      img.src = item.url;
      img.alt = item.outputName;
      preview.append(img);

      const meta = document.createElement("div");
      meta.className = "meta";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = item.outputName;

      const detail = document.createElement("div");
      detail.className = "detail";
      detail.textContent = `${item.originalSize} → ${item.croppedSize}`;

      const actions = document.createElement("div");
      actions.className = "card-actions";

      const downloadButton = document.createElement("button");
      downloadButton.className = "button";
      downloadButton.type = "button";
      downloadButton.textContent = "다운로드";
      downloadButton.addEventListener("click", () => downloadItem(item));

      actions.append(downloadButton);
      meta.append(name, detail, actions);
      card.append(preview, meta);
      grid.append(card);
    }

    function renderError(fileName, message) {
      const card = document.createElement("article");
      card.className = "card";
      card.style.gridTemplateRows = "auto";

      const meta = document.createElement("div");
      meta.className = "meta";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = fileName;

      const detail = document.createElement("div");
      detail.className = "detail";
      detail.style.color = "var(--danger)";
      detail.textContent = message;

      meta.append(name, detail);
      card.append(meta);
      grid.append(card);
    }

    function downloadItem(item) {
      const link = document.createElement("a");
      link.href = item.url;
      link.download = item.outputName;
      document.body.append(link);
      link.click();
      link.remove();
    }

    function updateControls() {
      const hasItems = processedItems.length > 0;
      clearButton.disabled = !hasItems;
      downloadAllButton.disabled = !hasItems;
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }
  </script>
</body>
</html>
