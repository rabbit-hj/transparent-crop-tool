<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투명 배경 이미지 자동 크롭</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #ffffff;
    --border: #e2e6ee;
    --text: #1f2533;
    --muted: #6b7280;
    --accent: #3b6fff;
    --accent-hover: #2f5ce0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; margin: 0 0 6px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 24px; }

  #drop {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: var(--panel);
  }
  #drop.over { border-color: var(--accent); background: #eef3ff; }
  #drop p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
  #drop strong { color: var(--text); font-size: 16px; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
    margin: 22px 0 8px; padding: 16px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .controls label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .controls input[type=range] { width: 160px; accent-color: var(--accent); }
  .controls input[type=number] { width: 64px; background: #f5f7fa; border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 6px; }
  .val { color: var(--text); font-variant-numeric: tabular-nums; min-width: 28px; }

  .btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .bar { display: flex; gap: 10px; margin: 18px 0; flex-wrap: wrap; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .thumb {
    background-image:
      linear-gradient(45deg, #dfe3ec 25%, transparent 25%),
      linear-gradient(-45deg, #dfe3ec 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #dfe3ec 75%),
      linear-gradient(-45deg, transparent 75%, #dfe3ec 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    display: flex; align-items: center; justify-content: center;
    min-height: 160px; padding: 10px;
  }
  .thumb img { max-width: 100%; max-height: 200px; display: block; image-rendering: auto; cursor: zoom-in; }
  /* 밀착 검사 보기: 이미지 박스에 빨간 외곽선을 딱 붙여, 가장자리에 빈 공간이 있으면 바로 보임 */
  .thumb.inspect { background: #fff; }
  .thumb.inspect img { outline: 2px solid #ff4d4f; outline-offset: 0; }
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px; margin-top: 8px; }
  .badge.ok { background: #e6f7ec; color: #1a8a4a; }
  .badge.warn { background: #fff4e5; color: #b76e00; }
  .meta { padding: 10px 12px; font-size: 12px; color: var(--muted); }
  .meta .name { color: var(--text); font-size: 13px; word-break: break-all; margin-bottom: 6px; }
  .meta .row { display: flex; justify-content: space-between; gap: 8px; font-variant-numeric: tabular-nums; padding: 1px 0; }
  .meta .row b { color: var(--text); font-weight: 600; }
  .meta .row.trim b { color: var(--accent); }
  .card { box-shadow: 0 1px 3px rgba(20,30,60,.06); }
  .card .dl { display: block; text-align: center; padding: 9px; background: #f0f4ff; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; border-top: 1px solid var(--border); }
  .card .dl:hover { background: #e4ecff; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }

  /* 확대 팝업 */
  #modal { position: fixed; inset: 0; background: rgba(20,28,48,.6); display: none; align-items: center; justify-content: center; padding: 30px; z-index: 50; }
  #modal.show { display: flex; }
  .modal-box { background: #fff; border-radius: 14px; padding: 20px; max-width: 92vw; max-height: 92vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .modal-stage {
    display: flex; align-items: center; justify-content: center;
    overflow: auto; flex: 1; min-height: 0; padding: 8px;
  }
  /* 이미지를 감싸는 래퍼에 빨간 테두리 → 그림 경계에 딱 붙어서 잘리지 않고 보임 */
  .frame {
    display: inline-block; line-height: 0; border: 3px solid #ff2d2f;
    background-image:
      linear-gradient(45deg, #dfe3ec 25%, transparent 25%),
      linear-gradient(-45deg, #dfe3ec 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #dfe3ec 75%),
      linear-gradient(-45deg, transparent 75%, #dfe3ec 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  }
  .modal-stage img { display: block; max-width: 84vw; max-height: 72vh; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 16px; }
  .modal-head .t { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-all; }
  .modal-head .x { background: none; border: none; font-size: 24px; line-height: 1; color: var(--muted); cursor: pointer; padding: 0 4px; }
  .modal-head .x:hover { color: var(--text); }
  .modal-foot { margin-top: 12px; font-size: 12px; color: var(--muted); text-align: center; }
  .modal-foot b { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <h1>투명 배경 이미지 자동 크롭</h1>
  <p class="sub">투명 PNG를 올리면 그림 끝에 여백 없이 딱 맞게 잘라줍니다. 미리캔버스 업로드용으로 바로 사용하세요.</p>

  <div id="drop">
    <strong>이미지를 끌어다 놓거나 클릭해서 선택</strong>
    <p>PNG · WEBP 등 투명 배경 이미지 (여러 개 동시 가능)</p>
  </div>
  <input type="file" id="file" accept="image/png,image/webp,image/*" multiple hidden>

  <div class="controls">
    <label>
      투명도 기준
      <input type="range" id="thresh" min="0" max="254" value="16">
      <span class="val" id="threshVal">16</span>
    </label>
    <label>
      여백(px)
      <input type="number" id="pad" value="0" min="0" max="200">
    </label>
    <label>
      파일 이름
      <input type="text" id="nameBase" placeholder="오늘 날짜" style="width:150px;background:#f5f7fa;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;">
    </label>
    <label style="cursor:pointer">
      <input type="checkbox" id="inspect" style="accent-color:var(--accent)">
      밀착 검사 보기
    </label>
    <span class="hint">크롭이 안 되면 기준값을 올리세요. 가장자리의 거의 안 보이는 반투명 픽셀까지 잘라냅니다.</span>
  </div>

  <div class="bar">
    <button class="btn" id="dlAll" disabled>전체 다운로드</button>
    <button class="btn ghost" id="clear" disabled>초기화</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="t" id="modalTitle"></span>
      <button class="x" id="modalClose" aria-label="닫기">×</button>
    </div>
    <div class="modal-stage"><span class="frame"><img id="modalImg" alt=""></span></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const grid = document.getElementById('grid');
const thresh = document.getElementById('thresh');
const threshVal = document.getElementById('threshVal');
const padInput = document.getElementById('pad');
const dlAll = document.getElementById('dlAll');
const clearBtn = document.getElementById('clear');
const inspect = document.getElementById('inspect');
const nameBase = document.getElementById('nameBase');

// 오늘 날짜+시각 (YYYY-MM-DD_HHMMSS, 로컬 기준)
function todayStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}

// 다운로드 파일명 계산: chatgpt 키워드 제거 + 기본 이름(사용자 지정 or 날짜+시각) + 순서(-1, -2)
function computeName(it, index, stamp) {
  let base = nameBase.value.trim();
  if (!base) base = stamp;
  // 기본 이름에서도 혹시 모를 chatgpt 제거
  base = base.replace(/chat\s*gpt/ig, '').trim() || stamp;
  const suffix = items.length > 1 ? `-${index + 1}` : '';
  return `${base}${suffix}.png`;
}

let items = []; // { name, img, canvas, url, w, h }

drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFiles(e.target.files));
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

thresh.addEventListener('input', () => { threshVal.textContent = thresh.value; reprocess(); });
padInput.addEventListener('input', reprocess);
inspect.addEventListener('change', reprocess);
nameBase.addEventListener('input', reprocess);
clearBtn.addEventListener('click', reset);
dlAll.addEventListener('click', downloadAll);

// 각 이미지를 개별 파일로 순차 다운로드 (지정된 이름 자동 적용)
function downloadAll() {
  items.forEach((it, i) => setTimeout(() => downloadItem(it), i * 350));
}

function reset() {
  items = [];
  grid.innerHTML = '';
  fileInput.value = '';
  dlAll.disabled = clearBtn.disabled = true;
}

function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  files.forEach(f => {
    const img = new Image();
    img.onload = () => {
      const it = { name: f.name, img };
      items.push(it);
      render();
    };
    img.src = URL.createObjectURL(f);
  });
}

// 불투명 픽셀의 경계 박스를 찾아 크롭
function cropImage(img) {
  const t = parseInt(thresh.value, 10);
  const pad = Math.max(0, parseInt(padInput.value, 10) || 0);
  const w = img.naturalWidth, h = img.naturalHeight;

  const src = document.createElement('canvas');
  src.width = w; src.height = h;
  const sctx = src.getContext('2d');
  sctx.drawImage(img, 0, 0);
  const data = sctx.getImageData(0, 0, w, h).data;

  let minX = w, minY = h, maxX = -1, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const alpha = data[(y * w + x) * 4 + 3];
      if (alpha > t) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  // 전부 투명하면 원본 그대로
  if (maxX < 0) { minX = 0; minY = 0; maxX = w - 1; maxY = h - 1; }

  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad);
  maxY = Math.min(h - 1, maxY + pad);

  const cw = maxX - minX + 1, ch = maxY - minY + 1;
  const out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  out.getContext('2d').drawImage(src, minX, minY, cw, ch, 0, 0, cw, ch);
  return { canvas: out, w: cw, h: ch };
}

// 크롭된 결과의 각 변에 비어있는(완전 투명) 줄이 몇 px 있는지 측정 → 0이면 밀착
function checkEdges(canvas) {
  const t = parseInt(thresh.value, 10);
  const w = canvas.width, h = canvas.height;
  const d = canvas.getContext('2d').getImageData(0, 0, w, h).data;
  const rowHas = y => { for (let x = 0; x < w; x++) if (d[(y*w+x)*4+3] > t) return true; return false; };
  const colHas = x => { for (let y = 0; y < h; y++) if (d[(y*w+x)*4+3] > t) return true; return false; };
  let top = 0, bottom = 0, left = 0, right = 0;
  while (top < h && !rowHas(top)) top++;
  while (bottom < h && !rowHas(h-1-bottom)) bottom++;
  while (left < w && !colHas(left)) left++;
  while (right < w && !colHas(w-1-right)) right++;
  return { top, bottom, left, right, tight: !top && !bottom && !left && !right };
}

function processItem(it) {
  const r = cropImage(it.img);
  it.canvas = r.canvas; it.w = r.w; it.h = r.h;
  it.ow = it.img.naturalWidth; it.oh = it.img.naturalHeight;
  it.url = r.canvas.toDataURL('image/png');
  it.edges = checkEdges(r.canvas);
}

function downloadItem(it) {
  const a = document.createElement('a');
  a.href = it.url;
  a.download = it.outName || 'image.png';
  document.body.appendChild(a); a.click(); a.remove();
}

function render() {
  items.forEach(processItem);
  grid.innerHTML = '';
  const stamp = todayStr();
  items.forEach((it, idx) => {
    it.outName = computeName(it, idx, stamp);
    const card = document.createElement('div');
    card.className = 'card';
    const trimmed = (it.ow - it.w) + (it.oh - it.h);
    const badge = trimmed > 0
      ? `<span class="badge ok">✓ 여백 ${it.ow - it.w}×${it.oh - it.h}px 제거 · 4면 밀착</span>`
      : `<span class="badge warn">⚠ 잘린 여백 없음 — 기준값을 올려보세요</span>`;
    card.innerHTML = `
      <div class="thumb ${inspect.checked ? 'inspect' : ''}"><img src="${it.url}" alt="" data-idx="${items.indexOf(it)}"></div>
      <div class="meta">
        <div class="name">${it.outName}</div>
        <div class="row"><span>원본</span><b>${it.ow} × ${it.oh} px</b></div>
        <div class="row"><span>크롭 후</span><b>${it.w} × ${it.h} px</b></div>
        <div class="row trim"><span>잘린 여백</span><b>−${it.ow - it.w} × ${it.oh - it.h} px</b></div>
        ${badge}
      </div>
      <a class="dl" href="${it.url}" download="${it.outName}">다운로드</a>
    `;
    grid.appendChild(card);
  });
  const has = items.length > 0;
  dlAll.disabled = clearBtn.disabled = !has;
}

function reprocess() { if (items.length) render(); }

// 확대 팝업 (빨간 외곽선)
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalTitle = document.getElementById('modalTitle');
const modalFoot = document.getElementById('modalFoot');

grid.addEventListener('click', e => {
  const img = e.target.closest('img[data-idx]');
  if (!img) return;
  const it = items[+img.dataset.idx];
  if (!it) return;
  modalImg.src = it.url;
  modalTitle.textContent = it.outName;
  const trimmed = (it.ow - it.w) + (it.oh - it.h);
  modalFoot.innerHTML = `원본 ${it.ow}×${it.oh} → 크롭 후 <b>${it.w} × ${it.h} px</b> · `
    + (trimmed > 0 ? '<b style="color:#1a8a4a">✓ 빨간 선이 그림에 딱 붙어 있으면 여백 0px</b>'
                   : '<b style="color:#b76e00">⚠ 잘린 여백 없음 — 기준값을 올려보세요</b>');
  modal.classList.add('show');
});

function closeModal() { modal.classList.remove('show'); modalImg.src = ''; }
document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
